services:
  db:
    image: postgres:16-alpine
    container_name: examflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-examflow}
      POSTGRES_USER: ${POSTGRES_USER:-examflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examflow_password}
    ports:
      - "5432:5432"
    volumes:
      - examflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examflow} -d ${POSTGRES_DB:-examflow}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build: ./server
    container_name: examflow-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-examflow}:${POSTGRES_PASSWORD:-examflow_password}@db:5432/${POSTGRES_DB:-examflow}
      JWT_SECRET: ${JWT_SECRET:-examflow_development_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CLIENT_ORIGIN: http://localhost:3000
      SEED_DATABASE: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build: ./client
    container_name: examflow-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  examflow_db_data:
