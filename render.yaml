services:
  - type: web
    name: examflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: examflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SEED_DATABASE
        value: true

databases:
  - name: examflow-db
    databaseName: examflow
    user: examflow
